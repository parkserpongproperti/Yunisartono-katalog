        // Typist text carousel effect
        const textElement = document.getElementById('typing-text');
        const phrases = ["Park Serpong", "Lippo Karawaci"];
        let pIdx = 0, cIdx = 0, isDel = false;
        
        function typeEffect() {
            const cur = phrases[pIdx];
            textElement.innerText = isDel ? cur.substring(0, cIdx - 1) : cur.substring(0, cIdx + 1);
            cIdx = isDel ? cIdx - 1 : cIdx + 1;
            if (!isDel && cIdx === cur.length) { 
                setTimeout(() => isDel = true, 2000); 
            } else if (isDel && cIdx === 0) { 
                isDel = false; 
                pIdx = (pIdx + 1) % phrases.length; 
            }
            setTimeout(typeEffect, isDel ? 80 : 150);
        }
        typeEffect();

            const container = document.getElementById('catalog-container');
            container.innerHTML = "";
            
            let filteredUnits = [];

            if (filter.trim() !== "") {
                // Skenario 1: Pencarian Global (mencari ke semua fase jika ada ketikan)
                Object.keys(ALL_UNITS).forEach(pKey => {
                    ALL_UNITS[pKey].forEach(unit => {
                        if (unit.name.toLowerCase().includes(filter.toLowerCase())) {
                            // Masukkan informasi properti beserta fase asalnya
                            filteredUnits.push({ ...unit, originalPhase: pKey });
                        }
                    });
                });
            } else {
                // Skenario 2: Normal View (hanya memuat fase yang sedang aktif)
                const units = ALL_UNITS[phase] || [];
                filteredUnits = units.map(unit => ({ ...unit, originalPhase: phase }));
            }
            
            if (filteredUnits.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full py-12 text-center text-slate-400">

                return;
            }

                const imgSupport = unit.photos[1] || unit.photos[0];

                        <!-- Custom Dual Image Layout: Left (1:1 Square) and Right (16:9 Aspect) -->
                        <div class="flex gap-3 items-center mb-4 h-24">
                            <!-- Foto Utama (Kiri, 1:1, lebih kecil) with error fallback support -->
                            <div class="w-24 h-24 shrink-0 bg-[#fcfaf7] rounded-2xl overflow-hidden relative shadow-sm border border-slate-100">
                                <img src="${imgMain}" onerror="this.onerror=null; this.src='${FALLBACK_1}';" loading="lazy" class="w-full h-full object-cover cursor-pointer hover:scale-110 transition-transform duration-500" onclick="openModal('${unit.id}', '${unit.originalPhase}')">
                                <span class="absolute bottom-1.5 left-1.5 bg-wood-950/95 text-gold-500 px-1.5 py-0.5 rounded text-[8px] font-black tracking-widest uppercase shadow-sm">UTAMA</span>
                            </div>
                            <!-- Foto Pendukung (Kanan, 16:9, tepat di sampingnya) with error fallback support -->
                            <div class="flex-1 h-24 bg-[#fcfaf7] rounded-2xl overflow-hidden relative shadow-sm border border-slate-100">
                                <img src="${imgSupport}" onerror="this.onerror=null; this.src='${FALLBACK_2}';" loading="lazy" class="w-full h-full object-cover cursor-pointer hover:scale-110 transition-transform duration-500" onclick="openModal('${unit.id}', '${unit.originalPhase}')">
                                <span class="absolute top-2 right-2 bg-wood-950/90 text-gold-500 px-2.5 py-0.5 rounded-full text-[9px] font-black tracking-wider uppercase shadow-sm">${phaseBadgeText}</span>
                            </div>
                        </div>
                        
                        <!-- Unit Details Info Area -->
                        <h3 class="font-black text-wood-950 text-base mb-1 leading-snug cursor-pointer hover:text-gold-500 transition-colors" onclick="openModal('${unit.id}', '${unit.originalPhase}')">${unit.name}</h3>
                        
                        <!-- Price Tag Placed Under Title and Above Description -->
                        <div class="text-[11px] text-slate-500 font-bold uppercase tracking-wider mb-1 mt-0.5">
                            Mulai Dari: <span class="text-gold-500 font-black text-sm normal-case ml-1">${unit.tag}</span>
                        </div>
                        
                        <p class="text-wood-800 text-xs mb-3 line-clamp-2 leading-relaxed">${unit.desc}</p>
                    </div>
                    
                    <div class="flex flex-col mt-auto">
                        <!-- Specs -->
                        <div class="grid grid-cols-3 gap-2 py-3 border-t border-b border-slate-100">
                            ${renderSpecs({bed: unit.bed, bath: unit.bath, floor: unit.floor})}
                        </div>
                        
                        <!-- Action Row: Split Buttons (Detail & WhatsApp icon in the corner) -->
                        <div class="flex gap-2 mt-4">
                            <button onclick="openModal('${unit.id}', '${unit.originalPhase}')" class="flex-1 py-3 border border-wood-950 text-wood-950 rounded-xl text-xs font-bold hover:bg-wood-950 hover:text-gold-500 transition-all duration-300">
                                Lihat Detail Unit
                            </button>
                            <a href="https://wa.me/6281386989553?text=${waMessage}" target="_blank" class="w-12 h-12 bg-green-500 hover:bg-green-600 text-white rounded-xl flex items-center justify-center transition-all duration-300 shadow-sm shrink-0 hover:scale-105 active:scale-95" title="Hubungi Yuni via WhatsApp">
                                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.48 8.414-.003 6.557-5.338 11.892-11.893 11.892-1.99-.001-3.951-.5-5.688-1.448l-6.305 1.654zM12 2.162c-5.366 0-9.729 4.363-9.729 9.728 0 2.125.68 4.15 1.937 5.826l-1.272 4.654 4.773-1.252c1.614.88 3.426 1.346 5.291 1.347h.004c5.366 0 9.73-4.363 9.73-9.729 0-2.6-1.011-5.044-2.848-6.882-1.836-1.836-4.28-2.847-6.882-2.847zm4.729 13.084c-.26-.13-1.534-.757-1.771-.843-.238-.086-.412-.13-.585.13-.173.26-.671.843-.822 1.016-.151.173-.303.195-.563.065-.26-.13-1.097-.404-2.09-1.288-.772-.689-1.293-1.54-1.444-1.801-.151-.26-.016-.4.114-.529.117-.117.26-.303.39-.455.13-.151.173-.26.26-.433.086-.173.043-.325-.022-.455-.065-.13-.585-1.41-.801-1.928-.211-.51-.43-.43-.585-.438-.151-.008-.324-.008-.497-.008-.173 0-.455.065-.693.303-.238.238-.91.888-.91 2.162 0 1.274.927 2.503 1.057 2.676.13.173 1.825 2.786 4.421 3.904.618.266 1.101.424 1.478.544.621.197 1.185.169 1.631.103.497-.074 1.534-.627 1.751-1.233.217-.607.217-1.127.151-1.233-.065-.108-.238-.173-.497-.303z"/>
                                </svg>
                            </a>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Active phase setter
        let currentPhase = '7', currentUnit = null, imgIdx = 0;
        
        function setPhase(p) {
            currentPhase = p;
            // Kosongkan kolom pencarian jika user sengaja berpindah tombol fase manual
            document.getElementById('search-input').value = "";
            
            document.querySelectorAll('.phase-btn').forEach(b => {
                const isSelected = b.innerText.includes(p) || (p === 'BlackStar' && b.innerText === 'BlackStar');
                if (isSelected) {
                    b.className = "phase-btn px-6 py-2 rounded-full font-bold text-xs whitespace-nowrap shadow-sm bg-wood-950 text-gold-500 transition";
                } else {
                    b.className = "phase-btn px-6 py-2 rounded-full font-bold text-xs whitespace-nowrap shadow-sm bg-white text-wood-950 border border-slate-200 transition";
                }
            });
            renderCatalog("", p);
        }

        // Modal triggers
        function openModal(id, phase) {
            currentUnit = ALL_UNITS[phase].find(u => u.id === id);
            imgIdx = 0;
            document.getElementById('modal-title').innerText = currentUnit.name;
            document.getElementById('modal-desc').innerText = currentUnit.desc;
            document.getElementById('modal-image').src = currentUnit.photos[0];
            
            // Set error fallback directly inside modal
            document.getElementById('modal-image').onerror = function() {
                this.onerror = null;
                this.src = FALLBACK_1;
            };
            
            document.getElementById('modal-price').innerText = currentUnit.tag;
            document.getElementById('modal-specs').innerHTML = renderSpecs({bed: currentUnit.bed, bath: currentUnit.bath, floor: currentUnit.floor});
            
            const waMsg = `Halo Yuni, saya tertarik dengan unit ${currentUnit.name}.`;
            document.getElementById('wa-tanya-yuni').href = `https://wa.me/6281386989553?text=${encodeURIComponent(waMsg)}`;
            
            document.getElementById('detail-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden'; // Lock background scroll
        }
        
        function nextImage() { 
            imgIdx = (imgIdx + 1) % currentUnit.photos.length; 
            const imgEl = document.getElementById('modal-image');
            imgEl.src = currentUnit.photos[imgIdx]; 
            imgEl.onerror = function() {
                this.onerror = null;
                this.src = FALLBACK_1;
            };
        }
        
        function prevImage() { 
            imgIdx = (imgIdx - 1 + currentUnit.photos.length) % currentUnit.photos.length; 
            const imgEl = document.getElementById('modal-image');
            imgEl.src = currentUnit.photos[imgIdx]; 
            imgEl.onerror = function() {
                this.onerror = null;
                this.src = FALLBACK_1;
            };
        }
        
        function closeModal() { 
            document.getElementById('detail-modal').classList.add('hidden'); 
            document.body.style.overflow = 'auto'; // Unlock background scroll
        }

        // Close modal when clicking outside content area
        document.getElementById('detail-modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // KPR Calculator
        function hitungKPR() { 
            const h = parseFloat(document.getElementById('kpr-harga').value);
            const d = parseFloat(document.getElementById('kpr-dp').value);
            const t = parseFloat(document.getElementById('kpr-tenor').value);
            
            if (h && d && t) {
                const loanPrincipal = h * (1 - d / 100);
                const totalMonths = t * 12;
                const cicilan = (loanPrincipal / totalMonths) * 1.05; 
                
                document.getElementById('kpr-result').innerText = `Rp ${Math.round(cicilan).toLocaleString('id-ID')}`;
                document.getElementById('kpr-result-box').classList.remove('hidden');
            }
        }
        
        function contactWhatsAppDirect() { 
            window.open(`https://wa.me/6281386989553?text=Halo%20Yuni,%20saya%20tertarik%20konsultasi%20KPR%20untuk%20unit%20di%20Park%20Serpong.`); 
        }
        
        function goToKPR() { 
            closeModal(); 
            document.getElementById('kpr-harga').value = currentUnit.val; 
            document.getElementById('kpr-dp').value = 10; // Default DP 10%
            document.getElementById('kpr-tenor').value = 15; // Default Tenor 15 years
            document.getElementById('kpr-section').scrollIntoView({ behavior: 'smooth' }); 
            hitungKPR(); 
        }

        // Listen for filter searches (Memanggil dengan passing state phase aktif)
        document.getElementById('search-input').addEventListener('input', (e) => {
            renderCatalog(e.target.value, currentPhase);
        });

        // Safe immediate initialization to support real-time preview container engines
        function initApp() {
            renderCatalog("", "7");
        }

        if (document.readyState === "complete" || document.readyState === "interactive") {
            initApp();
        } else {
            document.addEventListener("DOMContentLoaded", initApp);
        }
    </script>
</body>
</html>
