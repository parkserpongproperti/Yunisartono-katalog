    <section id="kpr-section" class="max-w-xl mx-auto px-4 py-12">

                    <input type="number" id="kpr-tenor" placeholder="Tenor (Thn)" class="p-4 rounded-xl border border-slate-200 bg-white text-sm shadow-sm">
                </div>
                <div id="kpr-result-box" class="bg-wood-950 p-6 rounded-2xl text-center mt-6 hidden">

                    <h3 id="kpr-result" class="text-2xl font-black text-gold-500 mb-6"></h3>

            ]
        };

        let currentPhase = '7', currentUnit = null, imgIdx = 0;

        function renderSpecs(specs, full = false) {
            return `
                <div class="text-center"><div class="font-bold text-gold-500 text-lg">🛏️</div><div class="text-[9px] text-slate-400 font-bold uppercase mt-1">Kamar Tidur</div><div class="text-sm font-bold text-wood-950">${specs.bed}</div></div>
                <div class="text-center"><div class="font-bold text-gold-500 text-lg">🛁</div><div class="text-[9px] text-slate-400 font-bold uppercase mt-1">Kamar Mandi</div><div class="text-sm font-bold text-wood-950">${specs.bath}</div></div>
                <div class="text-center"><div class="font-bold text-gold-500 text-lg">🏠</div><div class="text-[9px] text-slate-400 font-bold uppercase mt-1">Lantai</div><div class="text-sm font-bold text-wood-950">${specs.floor}</div></div>
            `;
        }

        function renderCatalog(filter = "", phase = "7") {
            const container = document.getElementById('catalog-container');
            container.innerHTML = "";
            const units = ALL_UNITS[phase] || [];
            units.filter(u => u.name.toLowerCase().includes(filter.toLowerCase())).forEach(unit => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-3xl border border-slate-100 p-5 shadow-sm";
                card.innerHTML = `
                    <img src="${unit.photos[0]}" class="w-full h-40 object-cover rounded-2xl mb-4">
                    <h3 class="font-black text-wood-950">${unit.name}</h3>
                    <p class="text-wood-800 text-xs my-2">${unit.desc}</p>
                    <div class="grid grid-cols-3 gap-2 py-3 border-t border-b border-slate-100">${renderSpecs({bed: unit.bed, bath: unit.bath, floor: unit.floor})}</div>
                    <button onclick="openModal('${unit.id}', '${phase}')" class="w-full py-3 bg-wood-950 text-gold-500 rounded-xl text-sm font-bold mt-4">Lihat Detail</button>
                `;
                container.appendChild(card);
            });
        }

        function setPhase(p) {
            currentPhase = p;
            document.querySelectorAll('.phase-btn').forEach(b => b.className = `phase-btn px-6 py-2 rounded-full font-bold text-xs whitespace-nowrap shadow-sm ${b.innerText.replace('Fase ', '').replace('BlackStar', 'BlackStar') === p ? "bg-wood-950 text-gold-500" : "bg-white text-wood-950 border border-slate-200"}`);
            renderCatalog(document.getElementById('search-input').value, p);
        }

        function openModal(id, phase) {
            currentUnit = ALL_UNITS[phase].find(u => u.id === id);
            imgIdx = 0;
            document.getElementById('modal-title').innerText = currentUnit.name;
            document.getElementById('modal-desc').innerText = currentUnit.desc;
            document.getElementById('modal-image').src = currentUnit.photos[0];
            document.getElementById('modal-specs').innerHTML = renderSpecs({bed: currentUnit.bed, bath: currentUnit.bath, floor: currentUnit.floor});
            document.getElementById('detail-modal').classList.remove('hidden');
        }

        function nextImage() { imgIdx = (imgIdx + 1) % currentUnit.photos.length; document.getElementById('modal-image').src = currentUnit.photos[imgIdx]; }
        function prevImage() { imgIdx = (imgIdx - 1 + currentUnit.photos.length) % currentUnit.photos.length; document.getElementById('modal-image').src = currentUnit.photos[imgIdx]; }
        function goToKPR() { closeModal(); document.getElementById('kpr-harga').value = currentUnit.val; document.getElementById('kpr-section').scrollIntoView({ behavior: 'smooth' }); hitungKPR(); }
        function hitungKPR() { 
            const h = document.getElementById('kpr-harga').value, d = document.getElementById('kpr-dp').value, t = document.getElementById('kpr-tenor').value;
            if(h && d && t) {
                const cicilan = ((h * (1 - d/100)) / (t * 12)) * 1.05;
                document.getElementById('kpr-result').innerText = `Rp ${Math.round(cicilan).toLocaleString('id-ID')}`;
                document.getElementById('kpr-result-box').classList.remove('hidden');
            }
        }
        function closeModal() { document.getElementById('detail-modal').classList.add('hidden'); }
        function contactWhatsAppDirect() { window.open(`https://wa.me/6281386989553?text=Halo Yuni, saya tertarik konsultasi KPR properti.`); }
        document.getElementById('search-input').addEventListener('input', (e) => renderCatalog(e.target.value, currentPhase));
        window.onload = () => renderCatalog();
    </script>
